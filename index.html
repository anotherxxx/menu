<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c-bg:#FAF8F4;--c-dark:#1C1410;--c-espresso:#2E1B0E;
  --c-gold:#B8935A;--c-gold-pale:#EDE0CC;--c-gold-dim:rgba(184,147,90,.1);
  --c-muted:#8A7560;--c-border:#DDD5C4;--c-surface:#F3EEE5;
  --ice-bg:#F0F6FA;--ice-dark:#0A2333;--ice-mid:#1566A0;
  --ice-accent:#1A8FC4;--ice-muted:#4E7E99;--ice-border:#B0D4E8;--ice-surface:#E2F0F8;
  --tea-bg:#F2F7EF;--tea-dark:#142214;--tea-mid:#2A6832;
  --tea-accent:#3D9147;--tea-muted:#537A59;--tea-border:#B0D4B5;--tea-surface:#E0EFE2;
  --shop-bg:#FBF6EE;--shop-dark:#2C1A06;--shop-mid:#A0621A;
  --shop-accent:#C8841E;--shop-muted:#9A7A50;--shop-border:#E8CFA0;--shop-surface:#F3E4C4;
  --pizza-bg:#161210;--pizza-red:#B83A22;--pizza-gold:#C8A050;
}
body{font-family:'Outfit',sans-serif;background:var(--c-bg);color:var(--c-dark);min-height:100vh;transition:background .5s,color .5s}
body.ice{background:var(--ice-bg);color:var(--ice-dark)}
body.tea{background:var(--tea-bg);color:var(--tea-dark)}
body.shop{background:var(--shop-bg);color:var(--shop-dark)}
body.pizza{background:var(--pizza-bg);color:#EDE5D8}

/* HERO */
.hero{text-align:center;position:relative}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--c-gold),transparent);transition:background .6s}
body.ice .hero::before{background:linear-gradient(90deg,transparent,var(--ice-accent),transparent)}
body.tea .hero::before{background:linear-gradient(90deg,transparent,var(--tea-accent),transparent)}
body.shop .hero::before{background:linear-gradient(90deg,transparent,var(--shop-accent),transparent)}
body.pizza .hero::before{background:linear-gradient(90deg,transparent,var(--pizza-gold),transparent)}
.hero-ornament{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:14px}
.hero-ornament-line{width:28px;height:1px;background:var(--c-gold);opacity:.45;transition:background .5s}
body.ice .hero-ornament-line{background:var(--ice-accent)} body.tea .hero-ornament-line{background:var(--tea-accent)}
body.shop .hero-ornament-line{background:var(--shop-accent)} body.pizza .hero-ornament-line{background:var(--pizza-gold)}
.hero-ornament-dot{width:4px;height:4px;border-radius:50%;background:var(--c-gold);transition:background .5s}
body.ice .hero-ornament-dot{background:var(--ice-accent)} body.tea .hero-ornament-dot{background:var(--tea-accent)}
body.shop .hero-ornament-dot{background:var(--shop-accent)} body.pizza .hero-ornament-dot{background:var(--pizza-gold)}
.eyebrow{font-size:9px;font-weight:500;letter-spacing:5px;text-transform:uppercase;color:var(--c-gold);margin-bottom:12px;transition:color .5s}
body.ice .eyebrow{color:var(--ice-accent)} body.tea .eyebrow{color:var(--tea-accent)}
body.shop .eyebrow{color:var(--shop-accent)} body.pizza .eyebrow{color:var(--pizza-gold)}
.hero-title{font-family:'Cormorant Garamond',serif;font-weight:300;line-height:.85;letter-spacing:-2px;color:var(--c-espresso);transition:color .5s}
body.ice .hero-title{color:var(--ice-dark)} body.tea .hero-title{color:var(--tea-dark)}
body.shop .hero-title{color:var(--shop-dark)} body.pizza .hero-title{color:#EDE5D8}
.hero-title em{font-style:italic;font-weight:300;color:var(--c-gold);transition:color .5s}
body.ice .hero-title em{color:var(--ice-accent)} body.tea .hero-title em{color:var(--tea-accent)}
body.shop .hero-title em{color:var(--shop-accent)} body.pizza .hero-title em{color:var(--pizza-gold)}
.hero-sub{font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--c-muted);transition:color .5s}
body.ice .hero-sub{color:var(--ice-muted)} body.tea .hero-sub{color:var(--tea-muted)}
body.shop .hero-sub{color:var(--shop-muted)} body.pizza .hero-sub{color:#7A6A58}

/* NAV */
.nav-group{display:flex;flex-direction:column;align-items:center}
.nav-row{display:flex;justify-content:center}
.nav,.pizza-nav{display:inline-flex;gap:2px;border-radius:10px;padding:4px;transition:background .5s,border-color .5s}
.nav{background:var(--c-surface);border:1px solid var(--c-border)}
.pizza-nav{background:var(--c-surface);border:1px solid var(--c-border)}
body.ice .nav,body.ice .pizza-nav{background:var(--ice-surface);border-color:var(--ice-border)}
body.tea .nav,body.tea .pizza-nav{background:var(--tea-surface);border-color:var(--tea-border)}
body.shop .nav,body.shop .pizza-nav{background:var(--shop-surface);border-color:var(--shop-border)}
body.pizza .nav,body.pizza .pizza-nav{background:rgba(42,31,24,.75);border-color:#3A2E24}
.food-sep{display:flex;align-items:center;gap:12px;width:100%}
.food-sep-line{flex:1;height:1px;background:var(--c-border);transition:background .5s}
body.ice .food-sep-line{background:var(--ice-border)} body.tea .food-sep-line{background:var(--tea-border)}
body.shop .food-sep-line{background:var(--shop-border)} body.pizza .food-sep-line{background:#3A2E24}
.food-sep-label{font-size:8px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--c-muted);white-space:nowrap;transition:color .5s}
body.ice .food-sep-label{color:var(--ice-muted)} body.tea .food-sep-label{color:var(--tea-muted)}
body.shop .food-sep-label{color:var(--shop-muted)} body.pizza .food-sep-label{color:#7A6A58}
.nb{font-family:'Outfit',sans-serif;font-weight:500;letter-spacing:1px;text-transform:uppercase;border:none;background:none;border-radius:7px;color:var(--c-muted);cursor:pointer;-webkit-appearance:none;appearance:none;transition:background .25s,color .25s;white-space:nowrap;min-height:44px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;-webkit-user-select:none}
body.ice .nb{color:var(--ice-muted)} body.tea .nb{color:var(--tea-muted)}
body.shop .nb{color:var(--shop-muted)} body.pizza .nb{color:#9A8A7A}
.nb.on[data-group="main"]{font-weight:600}
body:not(.ice):not(.tea):not(.shop):not(.pizza) .nb.on[data-group="main"]{background:var(--c-espresso);color:var(--c-gold-pale)}
body.ice .nb.on[data-group="main"]{background:var(--ice-mid);color:#E8F4FB}
body.tea .nb.on[data-group="main"]{background:var(--tea-mid);color:#EAF5EA}
body.shop .nb.on[data-group="main"]{background:var(--shop-mid);color:#FDF5EA}
body.pizza .nb.on[data-group="main"]{background:var(--pizza-red);color:#FFF0E8}
.nb.on[data-group="pizza"]{background:var(--pizza-red);color:#FFF0E8;font-weight:600}
.nb:not(.on)[data-group="pizza"]{color:#B83A22;opacity:.6}
body.pizza .nb:not(.on)[data-group="pizza"]{color:#E8A090;opacity:.7}

/* EKSTRALAR */
.extras-wrap{transition:opacity .3s}
.extras{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:6px}
.extras-label{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--c-muted);transition:color .5s}
body.ice .extras-label{color:var(--ice-muted)}
body.tea .extras-label{color:var(--tea-muted)}
body.shop .extras-label{color:var(--shop-muted)}
.extras-sep-dot{color:var(--c-border);font-size:12px}
.extra-pill{font-size:11px;font-weight:500;border:1px solid var(--c-border);border-radius:20px;color:var(--c-espresso);background:var(--c-surface);white-space:nowrap;transition:all .4s;display:flex;align-items:center;gap:4px}
body.ice .extra-pill{border-color:var(--ice-border);color:var(--ice-dark);background:var(--ice-surface)}
body.pizza .extra-pill{border-color:#3A2E24;color:#CFC0A8;background:#2A1F18}
.extra-price{font-weight:600;color:var(--c-gold);transition:color .5s}
body.ice .extra-price{color:var(--ice-accent)} body.pizza .extra-price{color:var(--pizza-gold)}

/* DİVİDER */
.dl{display:flex;align-items:center;gap:12px}
.dl-inner{display:flex;align-items:center;gap:7px;white-space:nowrap}
.dl-text{font-size:8px;font-weight:600;letter-spacing:3.5px;text-transform:uppercase;color:var(--c-gold);transition:color .5s}
body.ice .dl-text{color:var(--ice-accent)} body.tea .dl-text{color:var(--tea-accent)}
body.shop .dl-text{color:var(--shop-accent)} body.pizza .dl-text{color:var(--pizza-gold)}
.dl-gem{width:4px;height:4px;background:var(--c-gold);transform:rotate(45deg);opacity:.55;flex-shrink:0;transition:background .5s}
body.ice .dl-gem{background:var(--ice-accent)} body.tea .dl-gem{background:var(--tea-accent)}
body.shop .dl-gem{background:var(--shop-accent)} body.pizza .dl-gem{background:var(--pizza-gold)}
.dl::before,.dl::after{content:'';flex:1;height:1px;background:var(--c-border);transition:background .5s}
body.ice .dl::before,body.ice .dl::after{background:var(--ice-border)}
body.tea .dl::before,body.tea .dl::after{background:var(--tea-border)}
body.shop .dl::before,body.shop .dl::after{background:var(--shop-border)}
body.pizza .dl::before,body.pizza .dl::after{background:#3A2E24}

/* ROW */
.row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;border-bottom:1px solid var(--c-border);border-left:2px solid transparent;border-right:2px solid transparent;padding-left:12px;padding-right:12px;transition:border-color .4s,border-left-color .25s,border-right-color .25s,background .2s}
.row:hover{background:var(--c-gold-dim);border-left-color:var(--c-gold);border-right-color:var(--c-gold)}
body.ice .row{border-bottom-color:var(--ice-border)}
body.ice .row:hover{background:rgba(26,143,196,.07);border-left-color:var(--ice-accent);border-right-color:var(--ice-accent)}
body.tea .row{border-bottom-color:var(--tea-border)}
body.tea .row:hover{background:rgba(61,145,71,.07);border-left-color:var(--tea-accent);border-right-color:var(--tea-accent)}
body.shop .row{border-bottom-color:var(--shop-border)}
body.shop .row:hover{background:rgba(200,132,30,.08);border-left-color:var(--shop-accent);border-right-color:var(--shop-accent)}
body.pizza .row{border-bottom-color:#3A2E24}
body.pizza .row:hover{background:rgba(200,192,160,.04);border-left-color:var(--pizza-gold);border-right-color:var(--pizza-gold)}
.rw.open .row{border-left-color:var(--c-gold);border-right-color:var(--c-gold);background:var(--c-gold-dim)}
body.ice .rw.open .row{border-left-color:var(--ice-accent);border-right-color:var(--ice-accent);background:rgba(26,143,196,.07)}
body.tea .rw.open .row{border-left-color:var(--tea-accent);border-right-color:var(--tea-accent);background:rgba(61,145,71,.07)}
body.shop .rw.open .row{border-left-color:var(--shop-accent);border-right-color:var(--shop-accent);background:rgba(200,132,30,.08)}
body.pizza .rw.open .row{border-left-color:var(--pizza-gold);border-right-color:var(--pizza-gold);background:rgba(200,192,160,.04)}
.row:last-child{border-bottom:none}
.row-left{flex:1;min-width:0}

/* Akordeon tıklanabilir row */
.rw .row{cursor:pointer}

.rname{font-family:'Cormorant Garamond',serif;font-weight:400;line-height:1.15;color:var(--c-espresso);transition:color .5s}
body.ice .rname{color:var(--ice-dark)} body.tea .rname{color:var(--tea-dark)}
body.shop .rname{color:var(--shop-dark)} body.pizza .rname{color:#EDE5D8}
.rdesc{font-family:'Outfit',sans-serif;font-weight:300;color:var(--c-muted);line-height:1.55;transition:color .5s}
body.ice .rdesc{color:var(--ice-muted)} body.tea .rdesc{color:var(--tea-muted)}
body.shop .rdesc{color:var(--shop-muted)} body.pizza .rdesc{color:#7A6A58}
.kcal{display:flex;align-items:center;gap:5px}
.kcal-dot{width:3px;height:3px;border-radius:50%;background:var(--c-gold);flex-shrink:0;transition:background .5s}
body.ice .kcal-dot{background:var(--ice-accent)} body.tea .kcal-dot{background:var(--tea-accent)}
body.pizza .kcal-dot{background:var(--pizza-gold)}
.kcal-text{font-family:'Outfit',sans-serif;font-weight:300;color:var(--c-muted);transition:color .5s}
body.ice .kcal-text{color:var(--ice-muted)} body.tea .kcal-text{color:var(--tea-muted)}
body.pizza .kcal-text{color:#7A6A58}
.pb{text-align:right;flex-shrink:0}
.ps{font-family:'Outfit',sans-serif;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--c-muted);white-space:nowrap;display:block;transition:color .5s}
body.ice .ps{color:var(--ice-muted)} body.tea .ps{color:var(--tea-muted)}
body.shop .ps{color:var(--shop-muted)} body.pizza .ps{color:#7A6A58}
.pv{font-family:'Outfit',sans-serif;font-weight:500;color:var(--c-gold);white-space:nowrap;display:block;transition:color .5s}
body.ice .pv{color:var(--ice-accent)} body.tea .pv{color:var(--tea-accent)}
body.shop .pv{color:var(--shop-accent)} body.pizza .pv{color:var(--pizza-gold)}

/* AROMA KUTUSU */
.abox{background:var(--c-surface);border-left:2px solid var(--c-gold);border-radius:0 8px 8px 0;transition:background .5s,border-color .5s}
body.ice .abox{background:var(--ice-surface);border-left-color:var(--ice-accent)}
body.tea .abox{background:var(--tea-surface);border-left-color:var(--tea-accent)}
body.pizza .abox{background:#221810;border-left-color:var(--pizza-gold)}
.alabel{font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:var(--c-gold);transition:color .5s;display:block}
body.ice .alabel{color:var(--ice-accent)} body.tea .alabel{color:var(--tea-accent)}
body.pizza .alabel{color:var(--pizza-gold)}
.atags{display:flex;flex-wrap:wrap}
.atag{font-family:'Outfit',sans-serif;font-weight:400;border:1px solid var(--c-border);border-radius:20px;color:var(--c-dark);background:var(--c-bg);transition:all .4s}
body.ice .atag{background:var(--ice-bg);border-color:var(--ice-border);color:var(--ice-dark)}
body.tea .atag{background:var(--tea-bg);border-color:var(--tea-border);color:var(--tea-dark)}
body.pizza .atag{background:#1C1410;border-color:#3A2E24;color:#CFC0A8}

/* AKORDEON */
.rchev{
  display:block;font-size:14px;font-weight:300;
  color:var(--c-border);transition:transform .3s ease,color .25s;
  text-align:right;margin-top:4px;line-height:1;
  user-select:none;-webkit-user-select:none;flex-shrink:0;
}
body.ice .rchev{color:var(--ice-border)} body.tea .rchev{color:var(--tea-border)}
body.pizza .rchev{color:#3A2E24}
.rw.open .rchev{transform:rotate(90deg);color:var(--c-gold)}
body.ice .rw.open .rchev{color:var(--ice-accent)}
body.tea .rw.open .rchev{color:var(--tea-accent)}
.rinfo{
  max-height:0;overflow:hidden;
  transition:max-height .42s cubic-bezier(0.4,0,0.2,1);
}
.rw.open .rinfo{max-height:320px}
.rinfo-inner{
  background:linear-gradient(135deg,var(--c-surface) 0%,var(--c-bg) 100%);
  border-left:2px solid var(--c-gold);
  border-right:2px solid var(--c-gold);
  border-bottom:1px solid var(--c-gold-pale);
  border-radius:0 0 10px 10px;
  position:relative;overflow:hidden;
  transition:background .5s,border-color .5s;
}
.rinfo-inner::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--c-gold),rgba(184,147,90,.25),var(--c-gold));
  transition:background .5s;
}
body.ice .rinfo-inner{
  background:linear-gradient(135deg,var(--ice-surface) 0%,var(--ice-bg) 100%);
  border-left-color:var(--ice-accent);border-right-color:var(--ice-accent);border-bottom-color:var(--ice-border);
}
body.ice .rinfo-inner::before{background:linear-gradient(90deg,var(--ice-accent),rgba(26,143,196,.2),var(--ice-accent))}
body.tea .rinfo-inner{
  background:linear-gradient(135deg,var(--tea-surface) 0%,var(--tea-bg) 100%);
  border-left-color:var(--tea-accent);border-right-color:var(--tea-accent);border-bottom-color:var(--tea-border);
}
body.tea .rinfo-inner::before{background:linear-gradient(90deg,var(--tea-accent),rgba(61,145,71,.2),var(--tea-accent))}
body.shop .rinfo-inner{
  background:linear-gradient(135deg,var(--shop-surface) 0%,var(--shop-bg) 100%);
  border-left-color:var(--shop-accent);border-right-color:var(--shop-accent);border-bottom-color:var(--shop-border);
}
body.shop .rinfo-inner::before{background:linear-gradient(90deg,var(--shop-accent),rgba(200,132,30,.2),var(--shop-accent))}
body.pizza .rinfo-inner{
  background:linear-gradient(135deg,#221810 0%,var(--pizza-bg) 100%);
  border-left-color:var(--pizza-gold);border-right-color:var(--pizza-gold);border-bottom-color:#3A2E24;
}
body.pizza .rinfo-inner::before{background:linear-gradient(90deg,var(--pizza-gold),rgba(200,160,80,.2),var(--pizza-gold))}
.rinfo-icon{
  display:block;font-size:10px;color:var(--c-gold);opacity:.55;
  margin-bottom:4px;letter-spacing:3px;text-align:center;
  transition:color .5s;
}
body.ice .rinfo-icon{color:var(--ice-accent)} body.tea .rinfo-icon{color:var(--tea-accent)}
body.shop .rinfo-icon{color:var(--shop-accent)} body.pizza .rinfo-icon{color:var(--pizza-gold)}
.rinfo-text{
  font-family:'Outfit',sans-serif;font-weight:300;
  color:var(--c-muted);line-height:1.7;transition:color .5s;
  font-size:12px;font-style:italic;
}
body.ice .rinfo-text{color:var(--ice-muted)} body.tea .rinfo-text{color:var(--tea-muted)}
body.shop .rinfo-text{color:var(--shop-muted)} body.pizza .rinfo-text{color:#9A8A7A}

/* İPUCU BANDI */
.tap-hint{display:flex;align-items:center;justify-content:center}
.tap-hint-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:30px;padding:7px 16px;
  transition:background .5s,border-color .5s;
}
body.ice .tap-hint-badge{background:var(--ice-surface);border-color:var(--ice-border)}
body.tea .tap-hint-badge{background:var(--tea-surface);border-color:var(--tea-border)}
.tap-hint-icon{font-size:11px;opacity:.5;flex-shrink:0}
.tap-hint-text{
  font-family:'Outfit',sans-serif;font-size:8.5px;font-weight:500;
  letter-spacing:1.8px;text-transform:uppercase;
  color:var(--c-muted);white-space:nowrap;transition:color .5s;
}
body.ice .tap-hint-text{color:var(--ice-muted)} body.tea .tap-hint-text{color:var(--tea-muted)}

/* ALERJENLERİ */
.allergen-note{display:flex;align-items:flex-start;gap:8px;border-top:1px solid var(--c-border);transition:border-color .5s}
body.ice .allergen-note{border-top-color:var(--ice-border)} body.tea .allergen-note{border-top-color:var(--tea-border)}
body.pizza .allergen-note{border-top-color:#3A2E24}
.allergen-icon{font-size:10px;flex-shrink:0;opacity:.6;margin-top:2px}
.allergen-body{font-family:'Outfit',sans-serif;font-weight:300;color:var(--c-muted);line-height:1.5;font-style:italic;transition:color .5s}
body.ice .allergen-body{color:var(--ice-muted)} body.tea .allergen-body{color:var(--tea-muted)}
body.pizza .allergen-body{color:#7A6A58}
.a-pills{display:flex;flex-wrap:wrap;margin-top:5px}
.a-pill{font-family:'Outfit',sans-serif;font-weight:400;border:1px solid var(--c-border);border-radius:20px;color:var(--c-muted);background:var(--c-surface);transition:all .4s}
body.ice .a-pill{background:var(--ice-surface);border-color:var(--ice-border);color:var(--ice-muted)}
body.tea .a-pill{background:var(--tea-surface);border-color:var(--tea-border);color:var(--tea-muted)}
body.pizza .a-pill{background:#2A1F18;border-color:#3A2E24;color:#7A6A58}

/* DİĞER TABLO */
.product-table{width:100%;border-collapse:collapse;margin-top:6px}
.product-table th{font-family:'Outfit',sans-serif;font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--shop-muted);text-align:left;padding:7px 0 5px;border-bottom:1px solid var(--shop-border)}
.product-table th:last-child{text-align:right}
.product-table td{font-family:'Outfit',sans-serif;font-size:13px;font-weight:400;color:var(--shop-dark);padding:10px 0;border-bottom:1px solid var(--shop-border);vertical-align:middle}
.product-table tr:last-child td{border-bottom:none}
.product-table td:last-child{text-align:right;font-weight:600;color:var(--shop-accent);white-space:nowrap}
.pt-sub{font-size:10.5px;color:var(--shop-muted);font-weight:300;margin-left:6px}
.pnote{border-radius:8px;font-family:'Outfit',sans-serif;font-weight:300;letter-spacing:.5px;color:#7A6A58;text-align:center;font-style:italic;border:1px solid #3A2E24}
.sec{display:none}.sec.on{display:block}

/* PIZZA BUILDER */
.pizza-builder{
  background:linear-gradient(160deg,#1C1410 0%,#141008 100%);
  border:1px solid #342820;border-radius:16px;overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,.45),inset 0 1px 0 rgba(200,160,80,.08);
  position:relative;
}
.pizza-builder::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(200,160,80,.6) 40%,rgba(200,160,80,.6) 60%,transparent 100%);
  pointer-events:none;z-index:1;
}
.pb-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:22px 24px 20px;cursor:pointer;user-select:none;-webkit-user-select:none;
  transition:background .25s;
}
.pb-header:hover{background:rgba(200,160,80,.03)}
.pb-header-left{display:flex;align-items:center}
.pb-header-icon{display:none}
.pb-header-eyebrow{
  font-family:'Outfit',sans-serif;font-size:9px;font-weight:500;
  letter-spacing:5px;text-transform:uppercase;
  color:var(--pizza-gold);opacity:.75;margin-bottom:10px;
}
.pb-header-title{
  font-family:'Cormorant Garamond',serif;font-weight:300;font-size:32px;
  color:#EDE5D8;line-height:1;letter-spacing:-1px;
}
.pb-header-title em{font-style:italic;color:var(--pizza-gold);font-weight:300}
.pb-header-sub{
  font-family:'Outfit',sans-serif;font-size:9px;font-weight:300;
  letter-spacing:3px;text-transform:uppercase;color:#7A6A58;margin-top:8px;
}
.pb-toggle-arrow{
  font-size:18px;color:#6A5A4A;line-height:1;flex-shrink:0;
  transition:transform .38s cubic-bezier(0.4,0,0.2,1),color .25s;
}
.pizza-builder.open .pb-toggle-arrow{transform:rotate(90deg);color:var(--pizza-gold)}
.pb-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0.4,0,0.2,1)}
.pizza-builder.open .pb-body{max-height:1400px}
.pb-header-divider{
  height:1px;margin:0 24px;
  background:linear-gradient(90deg,transparent,#2E2218 25%,#2E2218 75%,transparent);
}
.pb-inner{padding:22px 24px 26px}
.pb-section{margin-bottom:20px}
.pb-section:last-of-type{margin-bottom:0}
.pb-sec-label{
  display:flex;align-items:center;gap:8px;
  font-family:'Outfit',sans-serif;font-size:8px;font-weight:600;
  letter-spacing:3.5px;text-transform:uppercase;color:var(--pizza-gold);
  opacity:.9;margin-bottom:10px;
}
.pb-sec-label::before{content:'◆';font-size:4.5px;opacity:.9;flex-shrink:0}
.pb-sec-optional{font-size:7px;font-weight:300;letter-spacing:1.5px;opacity:.65;font-style:italic;text-transform:none;margin-left:2px}
.pb-tags{display:flex;flex-wrap:wrap;gap:6px}
.pb-tag{
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:400;
  border:1px solid #3A2A1A;border-radius:20px;padding:6px 14px;
  color:#9A8A78;background:rgba(255,255,255,.02);cursor:pointer;
  transition:all .2s;-webkit-appearance:none;appearance:none;touch-action:manipulation;
  line-height:1.4;
}
.pb-tag:hover{border-color:#7A5040;color:#C8B090;background:rgba(255,255,255,.04)}
.pb-tag.on{
  background:rgba(184,58,34,.2);border-color:rgba(184,58,34,.8);
  color:#FFD0BC;font-weight:500;
  box-shadow:0 0 10px rgba(184,58,34,.18);
}
.pb-tag.locked{
  background:transparent;border-color:#1E1610;color:#3A2A1A;
  cursor:default;opacity:.45;font-style:italic;
}
.pb-size-row{display:flex;gap:8px}
.pb-size{
  font-family:'Cormorant Garamond',serif;font-weight:400;font-size:26px;
  flex:1;padding:14px 6px;letter-spacing:0;
  border:1px solid #2C2018;border-radius:10px;
  background:rgba(255,255,255,.02);color:#7A6A58;cursor:pointer;
  transition:all .25s;-webkit-appearance:none;appearance:none;
  display:flex;flex-direction:column;align-items:center;gap:5px;
  touch-action:manipulation;line-height:1;
}
.pb-size span{font-family:'Outfit',sans-serif;font-size:8px;font-weight:300;letter-spacing:2px;text-transform:uppercase;opacity:.65}
.pb-size:hover{border-color:#6A4A30;color:#B0907A;background:rgba(255,255,255,.03)}
.pb-size.on{
  background:rgba(200,160,80,.07);border-color:rgba(200,160,80,.5);
  color:var(--pizza-gold);
  box-shadow:inset 0 1px 0 rgba(200,160,80,.08);
}
.pb-divider{
  height:1px;margin:20px 0;
  background:linear-gradient(90deg,transparent,#2A1E14 20%,#2A1E14 80%,transparent);
}
.pb-summary{
  background:rgba(10,7,5,.5);border:1px solid #251A10;
  border-radius:10px;padding:16px 20px;position:relative;overflow:hidden;
}
.pb-summary::before{
  content:'';position:absolute;top:0;left:16px;right:16px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,160,80,.25),transparent);
}
.pb-summary-label{
  font-family:'Outfit',sans-serif;font-size:8px;font-weight:600;
  letter-spacing:3.5px;text-transform:uppercase;color:var(--pizza-gold);
  opacity:.8;margin-bottom:10px;
}
.pb-summary-text{
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:300;
  color:#A09080;line-height:1.65;min-height:20px;
  transition:color .2s;
}
.pb-summary-price{
  font-family:'Outfit',sans-serif;font-size:16px;font-weight:500;
  color:var(--pizza-gold);margin-top:14px;
  display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid #251A10;padding-top:14px;line-height:1;
}
.pb-summary-size-badge{
  font-family:'Outfit',sans-serif;
  font-size:8px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  color:#7A6A58;background:transparent;border:1px solid #3A2A1A;
  border-radius:4px;padding:4px 10px;
}
.pb-drink-price{font-size:10px;font-weight:500;color:var(--pizza-gold);opacity:.85;margin-left:3px}
.pb-reset{
  font-family:'Outfit',sans-serif;font-size:8px;font-weight:500;
  letter-spacing:2.5px;text-transform:uppercase;color:#7A6A58;
  background:none;border:none;cursor:pointer;padding:0;margin-top:12px;
  display:block;width:100%;text-align:right;transition:color .25s;
  touch-action:manipulation;
}
.pb-reset:hover{color:#9A8068}
.pb-order-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;margin-top:10px;padding:16px;
  background:linear-gradient(160deg,#C03C28 0%,#8A2A1A 100%);
  border:none;border-top:1px solid rgba(255,255,255,.08);border-radius:10px;
  font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;
  letter-spacing:2.5px;text-transform:uppercase;color:#FFE8DC;
  cursor:pointer;transition:opacity .2s,transform .12s;
  touch-action:manipulation;-webkit-appearance:none;appearance:none;
}
.pb-order-btn:hover{opacity:.85}
.pb-order-btn:active{transform:scale(.98)}
.pb-order-btn svg{width:16px;height:16px;flex-shrink:0;opacity:.8}

/* FOOTER */
.foot{text-align:center;font-family:'Outfit',sans-serif;font-weight:300;letter-spacing:4px;text-transform:uppercase;color:var(--c-border);transition:color .5s}
.foot-inner{display:inline-flex;align-items:center;gap:12px}
.foot-line{width:20px;height:1px;background:currentColor;opacity:.5}
body.ice .foot{color:var(--ice-border)} body.tea .foot{color:var(--tea-border)}
body.shop .foot{color:var(--shop-border)} body.pizza .foot{color:#3A2E24}

/* MOBİL */
@media(max-width:639px){
  .hero{padding:28px 14px 0}
  .hero-ornament{margin-bottom:10px}.hero-ornament-line{width:20px}
  .eyebrow{font-size:8px;margin-bottom:8px}
  .hero-title{font-size:clamp(40px,13vw,68px);letter-spacing:-1px}
  .hero-sub{font-size:9px;margin-top:12px}
  .nav-group{padding:18px 12px 0;gap:8px;width:100%}
  .nav-row{width:100%}.nav,.pizza-nav{width:100%}
  .nb{flex:1;font-size:10px;padding:0 5px;min-height:42px}
  .food-sep-label{font-size:7px}
  .extras-wrap{padding:12px 12px 0}.extras{gap:5px}.extras-label{font-size:7.5px}.extra-pill{font-size:9.5px;padding:4px 9px}
  .wrap{padding:0 12px 52px}
  .dl{margin:28px 0 2px}
  .row{padding:13px 10px 13px 10px;gap:10px}
  .rname{font-size:18px}.rdesc{font-size:11px;margin-top:3px}
  .kcal{margin-top:5px}.kcal-text{font-size:9px}
  .pb{min-width:62px}.ps{font-size:7.5px;margin-bottom:2px}.pv{font-size:13px}
  .rchev{font-size:12px;margin-top:3px}
  .abox{margin-top:9px;padding:9px 11px}.alabel{font-size:6.5px;margin-bottom:5px}
  .atags{gap:4px}.atag{font-size:9px;padding:3px 8px}
  .rinfo-inner{padding:10px 12px 12px;margin:0 0 4px}
  .rinfo-icon{font-size:9px;margin-bottom:3px}
  .rinfo-text{font-size:10.5px}
  .tap-hint{margin:18px 0 2px}
  .tap-hint-badge{padding:6px 14px}
  .tap-hint-text{font-size:7.5px}
  .tap-hint-icon{font-size:10px}
  .allergen-note{margin-top:28px;padding-top:16px;gap:7px}
  .allergen-body{font-size:10px}.a-pills{gap:4px;margin-top:5px}.a-pill{font-size:8px;padding:2px 7px}
  .product-table td{font-size:12px;padding:9px 0}.product-table th{font-size:7px}.pt-sub{font-size:9.5px}
  .pnote{margin-top:24px;padding:11px 13px;font-size:10.5px}
  .foot{padding:22px 12px 26px;font-size:8px}.foot-inner{gap:8px}.foot-line{width:14px}
}
/* MASAÜSTÜ */
@media(min-width:640px){
  .hero{padding:60px 32px 0}
  .hero-ornament{margin-bottom:16px}.hero-ornament-line{width:32px}
  .eyebrow{margin-bottom:13px}
  .hero-title{font-size:clamp(62px,9.5vw,100px)}
  .hero-sub{font-size:12px;margin-top:18px}
  .nav-group{padding:34px 24px 0;gap:11px;max-width:760px;margin:0 auto;align-items:stretch}
  .nav-row{justify-content:center}.nb{font-size:12px;padding:0 24px}
  .food-sep-label{font-size:8px}
  .extras-wrap{padding:18px 32px 0;max-width:760px;margin:0 auto}
  .extras-label{font-size:9px}.extra-pill{font-size:12px;padding:6px 14px}
  .wrap{max-width:760px;margin:0 auto;padding:0 32px 80px}
  .dl{margin:50px 0 4px}
  .row{padding:20px 14px 20px 14px;gap:28px}
  .rname{font-size:23px}.rdesc{font-size:13px;margin-top:5px}
  .kcal{margin-top:7px}.kcal-text{font-size:11px}
  .pb{min-width:115px}.ps{font-size:9px;margin-bottom:4px}.pv{font-size:15px}
  .rchev{font-size:14px;margin-top:5px}
  .abox{margin-top:12px;padding:12px 16px}.alabel{font-size:8px;margin-bottom:8px}
  .atags{gap:5px}.atag{font-size:10.5px;padding:4px 11px}
  .rinfo-inner{padding:12px 18px 14px;margin:0 0 6px}
  .rinfo-icon{font-size:10px;margin-bottom:5px}
  .rinfo-text{font-size:12.5px}
  .tap-hint{margin:22px 0 4px}
  .tap-hint-badge{padding:8px 20px}
  .tap-hint-text{font-size:9px}
  .pb-header-title{font-size:36px}
